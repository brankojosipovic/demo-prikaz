<!DOCTYPE html>
<html lang="sr-Latn" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Zaštićeni prikaz</title>
<style>
:root{--navy:#1B2A4A;--gold:#C9A227;--bg:#F2F4F8;--card:#fff;--txt:#1B2A4A;--muted:#5A6B8C;--line:#D9DEE8;--neg:#C0392B}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:Calibri,'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);
  color:var(--txt);display:flex;align-items:center;justify-content:center;padding:20px;font-size:16px}
.box{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 4px 18px rgba(27,42,74,.14);
  padding:26px 22px;max-width:380px;width:100%;text-align:center}
.lock{width:54px;height:54px;border-radius:14px;background:rgba(201,162,39,.16);color:var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
h1{font-size:18px;color:var(--navy);margin-bottom:4px}
p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
form{display:flex;flex-direction:column;gap:10px}
input{min-height:50px;border:2px solid var(--line);border-radius:12px;padding:0 14px;font-size:16px;
  font-family:inherit;color:var(--txt);background:#fff;outline:none}
input:focus{border-color:var(--gold)}
button{min-height:50px;border:0;border-radius:12px;background:var(--navy);color:#fff;font-size:16px;
  font-weight:700;font-family:inherit;cursor:pointer}
button:disabled{opacity:.6;cursor:default}
.err{color:var(--neg);font-size:13px;font-weight:600;min-height:18px;margin-top:2px}
.ft{font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5}
</style>
</head>
<body>
<div class="box">
  <div class="lock">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
  </div>
  <h1>Zaštićeni prikaz</h1>
  <p>Unesite lozinku da biste otvorili sadržaj.</p>
  <form id="f">
    <input id="pw" type="password" inputmode="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" placeholder="Lozinka" aria-label="Lozinka">
    <button id="btn" type="submit">Otvori</button>
    <div class="err" id="err" role="alert"></div>
  </form>
  <div class="ft">Sadržaj je šifrovan (AES-256). Demonstracioni prikaz - izmišljeni podaci.</div>
</div>

function b2u(b64){var s=atob(b64),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
var f=document.getElementById("f"),pw=document.getElementById("pw"),
    btn=document.getElementById("btn"),err=document.getElementById("err");
f.addEventListener("submit",function(e){
  e.preventDefault();err.textContent="";btn.disabled=true;btn.textContent="Otvaranje...";
  (async function(){
    try{
      var enc=new TextEncoder();
      var base=await crypto.subtle.importKey("raw",enc.encode(pw.value),"PBKDF2",false,["deriveKey"]);
      var key=await crypto.subtle.deriveKey(
        {name:"PBKDF2",salt:b2u(ENC.salt),iterations:ENC.iter,hash:"SHA-256"},
        base,{name:"AES-GCM",length:256},false,["decrypt"]);
      var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(ENC.iv)},key,b2u(ENC.ct));
      var html=new TextDecoder().decode(buf);
      document.open();document.write(html);document.close();
    }catch(ex){
      btn.disabled=false;btn.textContent="Otvori";
      err.textContent="Pogrešna lozinka.";pw.value="";pw.focus();
    }
  })();
});
pw.focus();
